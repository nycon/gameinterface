# GamePanel — Nginx Reverse Proxy (HTTP + HTTPS)
# Zertifikate: /etc/nginx/certs/fullchain.pem + privkey.pem (Installer erzeugt sie)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 100m;
    resolver 127.0.0.11 valid=10s ipv6=off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    upstream backend {
        server backend:8000;
        keepalive 16;
    }

    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    # Shared proxy map — included in both HTTP and HTTPS servers
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # HTTP — voller Proxy + ACME (auch ohne HTTPS nutzbar, z. B. Port 8080 lokal)
    server {
        listen 80 default_server;
        server_name _;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
            try_files $uri =404;
        }

        include /etc/nginx/gamepanel/proxy_locations.conf;
    }

    # HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Kein HSTS im Default — Self-Signed + HSTS sperrt Firefox (kein „Ausnahme“).
        # Nach gültigem Let's Encrypt optional aktivieren (max-age=31536000).
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;

        include /etc/nginx/gamepanel/proxy_locations.conf;
    }
}
