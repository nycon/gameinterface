# GamePanel — Production Overrides
# Verwendung: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  proxy:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/proxy_locations.conf:/etc/nginx/gamepanel/proxy_locations.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  backend:
    build: null
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE required in production}
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_LEVEL: info
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  frontend:
    build: null
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE required in production}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  postgres:
    ports: []
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  redis:
    ports: []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  worker:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE required in production}
    command: >
      php artisan queue:work
      --sleep=3
      --tries=3
      --max-time=3600
      --memory=512
    deploy:
      replicas: ${WORKER_PROCESSES:-2}
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  scheduler:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE required in production}
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  reverb:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE required in production}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      BROADCAST_CONNECTION: reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      - redis
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
